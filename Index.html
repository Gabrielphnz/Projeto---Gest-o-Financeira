<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --primary: #7C3AED; /* Roxo Fintech */
        --bg-color: #F3F4F6;
        --card-bg: #FFFFFF;
        --text-main: #1F2937;
        --text-muted: #6B7280;
        --success: #10B981;
        --success-bg: #D1FAE5;
        --danger: #EF4444;
        --danger-bg: #FEE2E2;
      }
      
      * { box-sizing: border-box; margin: 0; padding: 0; }
      
      body { 
        font-family: 'Inter', sans-serif; 
        background-color: var(--bg-color); 
        padding-bottom: 90px; 
        color: var(--text-main);
      }
      
      /* Header Roxo */
      .header {
        background: var(--primary);
        padding: 30px 20px 60px 20px;
        color: white;
        text-align: center;
        border-radius: 0 0 32px 32px;
      }
      .header p { font-size: 0.9rem; opacity: 0.8; margin-bottom: 5px; }
      .header h1 { font-size: 2.5rem; font-weight: 700; }

      /* Container de Cards Resumo */
      .cards-container {
        display: flex;
        gap: 15px;
        margin: -40px 20px 25px 20px;
      }

      .card-resumo {
        flex: 1;
        background: var(--card-bg);
        border-radius: 20px;
        padding: 16px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .card-resumo-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }

      .icon-box {
        width: 32px; height: 32px; border-radius: 10px;
        display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold;
      }
      .icon-receita { background: var(--success-bg); color: var(--success); }
      .icon-despesa { background: var(--danger-bg); color: var(--danger); }

      .card-resumo p { font-size: 0.8rem; color: var(--text-muted); font-weight: 500; }
      .card-resumo h3 { font-size: 1.1rem; font-weight: 700; color: var(--text-main); }
      .valor-receita { color: var(--success) !important; }
      .valor-despesa { color: var(--danger) !important; }

      /* Seção de Lista */
      .section-title { font-size: 1.1rem; font-weight: 700; margin: 0 20px 15px 20px; color: var(--text-main); }
      .lista-container { padding: 0 20px; }

      .item-lista { 
        background: var(--card-bg);
        border-radius: 16px;
        padding: 16px; 
        margin-bottom: 12px;
        display: flex; 
        align-items: center; 
        box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        cursor: pointer;
        transition: transform 0.1s;
      }
      .item-lista:active { transform: scale(0.98); }
      
      .item-icon-bg {
        width: 44px; height: 44px;
        border-radius: 12px;
        background: var(--bg-color);
        display: flex; align-items: center; justify-content: center;
        font-size: 20px; margin-right: 15px; flex-shrink: 0;
      }
      
      .item-info { flex: 1; overflow: hidden; }
      .item-info strong { font-size: 0.95rem; display: block; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
      .item-info span { font-size: 0.75rem; color: var(--text-muted); }
      
      .item-acoes { text-align: right; }
      .item-valor { font-weight: 700; font-size: 1rem; }
      .status-badge { font-size: 0.7rem; border-radius: 6px; padding: 3px 8px; margin-top: 5px; display: inline-block; font-weight: 600;}
      
      /* Navegação Inferior */
      .nav-bar { 
        position: fixed; bottom: 0; width: 100%; 
        background: var(--card-bg); 
        display: flex; justify-content: space-around; align-items: center;
        height: 75px;
        box-shadow: 0 -4px 25px rgba(0,0,0,0.05); 
        border-radius: 24px 24px 0 0;
      }
      
      .nav-btn { 
        background: none; border: none; font-size: 0.75rem; 
        color: var(--text-muted); cursor: pointer; font-weight: 600;
        display: flex; flex-direction: column; align-items: center; gap: 4px;
      }
      .nav-btn.active { color: var(--primary); }
      .nav-icon { font-size: 1.4rem; }

      .btn-float { 
        position: relative; top: -25px;
        background: var(--primary); color: white; 
        border: none; width: 60px; height: 60px; 
        border-radius: 50%; font-size: 30px; 
        box-shadow: 0 8px 20px rgba(124, 58, 237, 0.4); 
        cursor: pointer; display: flex; align-items: center; justify-content: center;
      }

      /* Estilização Modal Formulário */
      .swal2-popup { border-radius: 24px !important; }
      .swal-form-input, .swal-form-select { 
        width: 100%; padding: 14px; margin: 8px 0; 
        border: 1px solid #E5E7EB; border-radius: 12px; 
        box-sizing: border-box; font-family: 'Inter', sans-serif;
        background: #F9FAFB; font-size: 1rem;
      }
      .swal-form-input:focus, .swal-form-select:focus { outline: none; border-color: var(--primary); background: white; }
    </style>
  </head>
  <body>
    
    <div class="header">
      <p>Saldo em contas</p>
      <h1 id="saldo-total">R$ 0,00</h1>
    </div>

    <div class="cards-container">
      <div class="card-resumo">
        <div class="card-resumo-header">
          <div class="icon-box icon-receita">↑</div>
          <p>Receitas</p>
        </div>
        <h3 id="resumo-receitas" class="valor-receita">R$ 0,00</h3>
      </div>
      <div class="card-resumo">
        <div class="card-resumo-header">
          <div class="icon-box icon-despesa">↓</div>
          <p>Despesas</p>
        </div>
        <h3 id="resumo-despesas" class="valor-despesa">R$ 0,00</h3>
      </div>
    </div>

    <div class="section-title">Movimentações</div>
    <div class="lista-container" id="lista-lancamentos">
      <p style="text-align: center; color: var(--text-muted); padding: 30px;">Carregando...</p>
    </div>

    <div class="nav-bar">
      <button class="nav-btn active">
        <span class="nav-icon">📊</span>
        <span>Resumo</span>
      </button>
      <button class="btn-float" onclick="abrirModalFormulario()">+</button>
      <button class="nav-btn" onclick="Swal.fire('Em breve', 'Módulo de planejamento', 'info')">
        <span class="nav-icon">🎯</span>
        <span>Planos</span>
      </button>
    </div>

    <script>
      let lancamentosAtuais = [];
      let listaCartoes = [];

      document.addEventListener("DOMContentLoaded", () => { carregarDados(); });

      function formatarMoeda(valor) {
        return valor.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
      }

      function carregarDados() {
        document.getElementById('lista-lancamentos').innerHTML = '<p style="text-align: center; color: #6b7280; padding: 20px;">Buscando dados...</p>';
        google.script.run
          .withSuccessHandler((dados) => {
            const dadosSeguros = dados || []; 
            lancamentosAtuais = dadosSeguros; 
            processarResumo(dadosSeguros);
            montarLista(dadosSeguros);
          })
          .withFailureHandler((err) => {
            document.getElementById('lista-lancamentos').innerHTML = `<p style="color: red; text-align: center;">Erro: ${err.message}</p>`;
          })
          .obterLancamentos();
          google.script.run.withSuccessHandler((cartoes) => {
    listaCartoes = cartoes;
  }).obterCartoes();
      }

      function processarResumo(dados) {
        let totalReceitas = 0;
        let totalDespesas = 0;

        dados.forEach(item => {
          // Se o status for "Pendente", você pode optar por não somar no saldo atual. 
          // Neste exemplo, vou somar tudo, mas fica a dica caso queira separar.
          if (item.tipo === 'Receita') {
            totalReceitas += item.valor;
          } else {
            totalDespesas += item.valor;
          }
        });

        const saldoFinal = totalReceitas - totalDespesas;

        document.getElementById('saldo-total').innerText = formatarMoeda(saldoFinal);
        document.getElementById('resumo-receitas').innerText = formatarMoeda(totalReceitas);
        document.getElementById('resumo-despesas').innerText = formatarMoeda(totalDespesas);
      }

      function montarLista(dados) {
        const divLista = document.getElementById('lista-lancamentos');
        
        if(!dados || dados.length === 0) { 
          divLista.innerHTML = `<p style="text-align: center; color: #6b7280; padding: 40px;">Nenhum registro encontrado.</p>`; 
          return; 
        }
        
        let html = '';
        dados.slice(0, 30).forEach(item => {
          const isReceita = item.tipo === 'Receita';
          const corValor = isReceita ? 'var(--success)' : 'var(--text-main)';
          const sinal = isReceita ? '+' : '-';
          
          const isPendente = item.status === 'Pendente';
          const statusBg = isPendente ? 'var(--bg-color)' : (isReceita ? 'var(--success-bg)' : 'var(--danger-bg)');
          const statusColor = isPendente ? 'var(--text-muted)' : (isReceita ? 'var(--success)' : 'var(--danger)');

          // Ícone simples baseado no tipo ou categoria
          let icone = isReceita ? '💰' : '💸';
          if (!isReceita && item.categoria.toLowerCase().includes('alimentaçã')) icone = '🍔';
          if (!isReceita && item.categoria.toLowerCase().includes('transporte')) icone = '🚗';
          
          html += `
            <div class="item-lista" onclick="gerenciarItem('${item.id}')">
              <div class="item-icon-bg">${icone}</div>
              <div class="item-info">
                <strong>${item.descricao || 'Sem Descrição'}</strong>
                <span>${item.dataVenc} • ${item.categoria || 'Geral'}</span>
              </div>
              <div class="item-acoes">
                <div class="item-valor" style="color: ${corValor}">${sinal} ${formatarMoeda(item.valor).replace('R$', '').trim()}</div>
                <div class="status-badge" style="background: ${statusBg}; color: ${statusColor}">${item.status}</div>
              </div>
            </div>
          `;
        });
        divLista.innerHTML = html;
      }

      function gerenciarItem(id) {
        const item = lancamentosAtuais.find(l => l.id == id); 
        
        Swal.fire({
          title: item.descricao,
          text: formatarMoeda(item.valor),
          showDenyButton: true,
          showCancelButton: true,
          confirmButtonText: 'Editar',
          denyButtonText: 'Excluir',
          cancelButtonText: 'Fechar',
          confirmButtonColor: '#7C3AED',
          denyButtonColor: '#EF4444',
          reverseButtons: true
        }).then((result) => {
          if (result.isConfirmed) {
            abrirModalFormulario(item); 
          } else if (result.isDenied) {
            confirmarExclusao(id);
          }
        });
      }

      function confirmarExclusao(id) {
        Swal.fire({
          title: 'Excluir registro?',
          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#EF4444',
          cancelButtonColor: '#6B7280',
          confirmButtonText: 'Sim, excluir'
        }).then((result) => {
          if (result.isConfirmed) {
            Swal.showLoading();
            google.script.run
              .withSuccessHandler(() => {
                Swal.fire({title: 'Excluído!', icon: 'success', timer: 1500, showConfirmButton: false});
                carregarDados();
              }).withFailureHandler((err) => {
                Swal.fire('Erro', err.message, 'error');
              }).excluirLancamento(id);
          }
        });
      }

      function abrirModalFormulario(itemExistente = null) {
        const isEdit = itemExistente !== null;
        
        let dataInput = '';
        if (isEdit && itemExistente.dataVencBruta) {
          try {
            const d = new Date(itemExistente.dataVencBruta);
            if (!isNaN(d.getTime())) dataInput = d.toISOString().split('T')[0];
          } catch(e) {}
        }

        const htmlForm = `
          <select id="f-tipo" class="swal-form-select" style="font-weight: bold; color: var(--primary);">
            <option value="Despesa" ${isEdit && itemExistente.tipo === 'Despesa' ? 'selected' : ''}>Saída (Despesa)</option>
            <option value="Receita" ${isEdit && itemExistente.tipo === 'Receita' ? 'selected' : ''}>Entrada (Receita/Renda)</option>
          </select>

          <input id="f-desc" class="swal-form-input" placeholder="Descrição (ex: Salário, Mercado)" value="${isEdit ? itemExistente.descricao : ''}">
          <input id="f-valor" type="number" step="0.01" class="swal-form-input" placeholder="Valor (R$)" value="${isEdit ? itemExistente.valor : ''}">
          
          <select id="f-forma" class="swal-form-select">
            <option value="" disabled ${!isEdit || !itemExistente.formaPgto ? 'selected' : ''}>Forma de Pagamento/Recebimento</option>
            <option value="Pix" ${isEdit && itemExistente.formaPgto === 'Pix' ? 'selected' : ''}>Pix</option>
            <option value="Cartão de Crédito" ${isEdit && itemExistente.formaPgto === 'Cartão de Crédito' ? 'selected' : ''}>Cartão de Crédito</option>
            <option value="Dinheiro" ${isEdit && itemExistente.formaPgto === 'Dinheiro' ? 'selected' : ''}>Dinheiro/Transferência</option>
          </select>
          
          <input id="f-cat" class="swal-form-input" placeholder="Categoria (ex: Alimentação, Renda Fixa)" value="${isEdit ? itemExistente.categoria : ''}">
          
          <select id="f-status" class="swal-form-select">
            <option value="Liquidado" ${isEdit && itemExistente.status === 'Liquidado' ? 'selected' : ''}>Pago / Recebido</option>
            <option value="Pendente" ${!isEdit || itemExistente.status === 'Pendente' ? 'selected' : ''}>Pendente / A Vencer</option>
          </select>
          
          <input id="f-venc" type="date" class="swal-form-input" value="${dataInput}">
        `;

        Swal.fire({
          title: isEdit ? 'Editar Registro' : 'Novo Registro',
          html: htmlForm,
          focusConfirm: false,
          showCancelButton: true,
          confirmButtonText: 'Gravar',
          cancelButtonText: 'Cancelar',
          confirmButtonColor: '#7C3AED',
          preConfirm: () => {
            return {
              id: isEdit ? itemExistente.id : null,
              tipo: document.getElementById('f-tipo').value, // NOVO CAMPO
              descricao: document.getElementById('f-desc').value,
              valorBruto: document.getElementById('f-valor').value,
              formaPagamento: document.getElementById('f-forma').value,
              categoria: document.getElementById('f-cat').value,
              status: document.getElementById('f-status').value,
              dataVencimento: document.getElementById('f-venc').value
            };
          }
        }).then((result) => {
          if (result.isConfirmed) {
            Swal.showLoading();
            google.script.run
              .withSuccessHandler(() => {
                Swal.fire({title: 'Salvo!', icon: 'success', timer: 1500, showConfirmButton: false});
                carregarDados(); 
              })
              .withFailureHandler((err) => {
                Swal.fire('Erro', err.message, 'error');
              })
              .salvarLancamento(result.value);
          }
        });
        const htmlForm = `
    <select id="f-tipo" class="swal-form-select">
      <option value="Despesa" ${itemExistente?.tipo === 'Despesa' ? 'selected' : ''}>Saída (Despesa)</option>
      <option value="Receita" ${itemExistente?.tipo === 'Receita' ? 'selected' : ''}>Entrada (Receita)</option>
    </select>

    <input id="f-desc" class="swal-form-input" placeholder="Descrição" value="${itemExistente?.descricao || ''}">
    <input id="f-valor" type="number" step="0.01" class="swal-form-input" placeholder="Valor (R$)" value="${itemExistente?.valor || ''}">
    
    <select id="f-forma" class="swal-form-select" onchange="verificarCartao(this.value)">
      <option value="" disabled selected>Forma de Pagamento</option>
      <option value="Pix">Pix</option>
      <option value="Dinheiro">Dinheiro</option>
      <option value="Cartão de Crédito">Cartão de Crédito</option>
    </select>

    <div id="div-cartao" style="display:none;">
      <select id="f-cartao-nome" class="swal-form-select">
        <option value="">Selecione o Cartão</option>
        ${listaCartoes.map(c => `<option value="${c}">${c}</option>`).join('')}
      </select>
    </div>

    <input id="f-cat" class="swal-form-input" placeholder="Categoria" value="${itemExistente?.categoria || ''}">
    <select id="f-status" class="swal-form-select">
      <option value="Liquidado">Pago / Recebido</option>
      <option value="Pendente">Pendente</option>
    </select>
    <input id="f-venc" type="date" class="swal-form-input" value="${dataInput}">
  `;

  Swal.fire({
    title: itemExistente ? 'Editar' : 'Novo Registro',
    html: htmlForm,
    preConfirm: () => {
      return {
        id: itemExistente?.id || null,
        tipo: document.getElementById('f-tipo').value,
        descricao: document.getElementById('f-desc').value,
        valorBruto: document.getElementById('f-valor').value,
        formaPagamento: document.getElementById('f-forma').value,
        cartaoSelecionado: document.getElementById('f-cartao-nome').value,
        categoria: document.getElementById('f-cat').value,
        status: document.getElementById('f-status').value,
        dataVencimento: document.getElementById('f-venc').value
      };
    }
  }).then((result) => {
    if (result.isConfirmed) {
      google.script.run.withSuccessHandler(carregarDados).salvarLancamento(result.value);
    }
  });

      }

      function verificarCartao(valor) {
  const div = document.getElementById('div-cartao');
  div.style.display = (valor === 'Cartão de Crédito') ? 'block' : 'none';
}
    </script>
  </body>
</html>
